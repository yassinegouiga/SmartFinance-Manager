events {
    worker_connections 1024;
}

http {
    sendfile on;
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Hide nginx version in error pages and Server header
    server_tokens off;

    # Rate limiting: 30 req/min per IP (burst=20 allows short spikes without dropping)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_status 429;

    # Proxy timeouts — prevents slow-client attacks and stuck connections
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;
    proxy_connect_timeout  5s;

    server {
        listen 80;
        server_name localhost;

        # Security headers applied to every response
        add_header X-Frame-Options           "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # User Service
        location /api/v1/users/ {
            limit_req zone=api burst=20 nodelay;
            set $service_user http://smartfinance-service-user:8001;
            proxy_pass $service_user;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Transaction Service
        location /api/v1/transactions/ {
            limit_req zone=api burst=20 nodelay;
            set $service_transaction http://smartfinance-service-transaction:8001;
            proxy_pass $service_transaction;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Transaction Categories
        location /api/v1/categories/ {
            limit_req zone=api burst=20 nodelay;
            set $service_transaction http://smartfinance-service-transaction:8001;
            proxy_pass $service_transaction;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Budget Service
        location /api/v1/budgets/ {
            limit_req zone=api burst=20 nodelay;
            set $service_budget http://smartfinance-service-budget:8003;
            proxy_pass $service_budget;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Saving Pots
        location /api/v1/saving-pots/ {
            limit_req zone=api burst=20 nodelay;
            set $service_budget http://smartfinance-service-budget:8003;
            proxy_pass $service_budget;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Billing Service
        location /api/v1/bills/ {
            limit_req zone=api burst=20 nodelay;
            set $service_billing http://smartfinance-service-billing:8004;
            proxy_pass $service_billing;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Analytics Service
        location /api/v1/dashboard/ {
            limit_req zone=api burst=20 nodelay;
            set $service_analytics http://smartfinance-service-analytics:8005;
            proxy_pass $service_analytics;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification Service
        location /api/v1/notifications/ {
            limit_req zone=api burst=20 nodelay;
            set $service_notification http://smartfinance-service-notification:8006;
            proxy_pass $service_notification;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
