name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service-user
            needs_sqlite: true
          - service: service-transaction
            needs_sqlite: true
          - service: service-billing
            needs_sqlite: true
          - service: service-budget
            needs_sqlite: true
          - service: service-analytics
            needs_sqlite: false
          - service: service-notification
            needs_sqlite: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r ${{ matrix.service }}/requirements.txt --quiet

      - name: Run tests
        run: cd ${{ matrix.service }} && pytest tests/ -v
        env:
          TESTING: "1"
          # Dummy values so pydantic-settings doesn't fail on import
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379"
          FIREBASE_CREDENTIALS_PATH: "/tmp/fake.json"
          CORS_ORIGINS: '["http://localhost:3000"]'
          RESEND_API_KEY: ""
          RESEND_FROM: "test@example.com"
